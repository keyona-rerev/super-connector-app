<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super Connector</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── TOKENS ─────────────────────────────────────────────────── */
    :root {
      --bg:          #F5F4EF;
      --surface:     #FDFCF8;
      --surface2:    #F0EFE9;
      --border:      #E5E3DA;
      --border-soft: #EDEBE4;

      --text:        #1A1916;
      --text2:       #6B6860;
      --text3:       #9C9A93;

      --accent:      #D97757;   /* Claude orange */
      --accent-dim:  #FAF0EB;
      --accent2:     #8B7355;

      --critical:    #C0392B;
      --critical-bg: #FDF2F2;
      --high:        #D97757;
      --high-bg:     #FAF0EB;
      --medium:      #7B8FA1;
      --medium-bg:   #EEF2F6;
      --low:         #9C9A93;
      --low-bg:      #F5F4EF;

      --active-border:   #D97757;
      --planning-border: #7B8FA1;
      --blocked-border:  #C0392B;
      --complete-border: #5A8A5A;
      --dump-border:     #B0ADA4;

      --radius:    10px;
      --radius-lg: 14px;
      --shadow:    0 1px 3px rgba(26,25,22,0.07), 0 4px 12px rgba(26,25,22,0.04);
      --shadow-md: 0 2px 8px rgba(26,25,22,0.09), 0 8px 24px rgba(26,25,22,0.06);

      --font-serif: 'Instrument Serif', Georgia, serif;
      --font-sans:  'DM Sans', -apple-system, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── LAYOUT ──────────────────────────────────────────────────── */
    .shell { display: flex; height: 100vh; overflow: hidden; }

    /* Sidebar */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 0;
      overflow-y: auto;
    }
    .sidebar-logo {
      padding: 22px 20px 18px;
      border-bottom: 1px solid var(--border-soft);
    }
    .sidebar-logo h1 {
      font-family: var(--font-serif);
      font-size: 18px;
      font-weight: 400;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    .sidebar-logo span { color: var(--accent); }
    .sidebar-logo p {
      font-size: 11px;
      color: var(--text3);
      margin-top: 2px;
      letter-spacing: 0.03em;
    }

    .nav-section {
      padding: 16px 12px 8px;
    }
    .nav-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text3);
      padding: 0 8px;
      margin-bottom: 6px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 10px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 13.5px;
      font-weight: 400;
      color: var(--text2);
      transition: background 0.12s, color 0.12s;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active {
      background: var(--accent-dim);
      color: var(--accent);
      font-weight: 500;
    }
    .nav-item .icon { font-size: 15px; width: 18px; text-align: center; }

    .sidebar-bottom {
      margin-top: auto;
      padding: 16px 12px;
      border-top: 1px solid var(--border-soft);
    }

    /* Main */
    .main {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }
    .topbar {
      height: 56px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      flex-shrink: 0;
    }
    .topbar-title {
      font-family: var(--font-serif);
      font-size: 20px;
      font-weight: 400;
      letter-spacing: -0.02em;
    }
    .topbar-actions { display: flex; gap: 8px; align-items: center; }

    .page { flex: 1; overflow-y: auto; padding: 28px; }

    /* ── BUTTONS ─────────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: var(--font-sans); font-size: 13px; font-weight: 500;
      padding: 7px 14px; border-radius: var(--radius);
      border: none; cursor: pointer; transition: all 0.12s;
      white-space: nowrap;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { opacity: 0.88; }
    .btn-ghost {
      background: transparent; color: var(--text2);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--surface2); color: var(--text); }
    .btn-sm { font-size: 12px; padding: 5px 10px; }

    /* ── CARDS ───────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
    }

    /* ── BADGES ──────────────────────────────────────────────────── */
    .badge {
      display: inline-flex; align-items: center;
      font-size: 11px; font-weight: 500;
      padding: 2px 8px; border-radius: 20px;
      white-space: nowrap;
    }
    .badge-critical { background: var(--critical-bg); color: var(--critical); }
    .badge-high     { background: var(--high-bg);     color: var(--high); }
    .badge-medium   { background: var(--medium-bg);   color: var(--medium); }
    .badge-low      { background: var(--low-bg);      color: var(--low); }

    .status-dot {
      width: 7px; height: 7px; border-radius: 50%; display: inline-block;
      flex-shrink: 0;
    }
    .dot-active   { background: var(--active-border); }
    .dot-planning { background: var(--planning-border); }
    .dot-blocked  { background: var(--critical); }
    .dot-complete { background: var(--complete-border); }
    .dot-dump     { background: var(--dump-border); }

    /* ── SPINNER ─────────────────────────────────────────────────── */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-state {
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px;
      padding: 80px 20px; color: var(--text3);
      font-size: 13px;
    }

    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--text3);
    }
    .empty-state h3 { font-family: var(--font-serif); font-size: 20px; font-weight: 400; color: var(--text2); margin-bottom: 6px; }
    .empty-state p  { font-size: 13px; }

    /* ── TOAST ───────────────────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--text); color: var(--bg);
      font-size: 13px; padding: 10px 16px;
      border-radius: var(--radius); z-index: 9999;
      transform: translateY(8px); opacity: 0;
      transition: all 0.2s; box-shadow: var(--shadow-md);
      pointer-events: none;
    }
    .toast.show { transform: translateY(0); opacity: 1; }

    /* ══════════════════════════════════════════════════════════════
       INITIATIVES BOARD
    ══════════════════════════════════════════════════════════════ */
    .board-filters {
      display: flex; gap: 8px; align-items: center;
      margin-bottom: 24px; flex-wrap: wrap;
    }
    .filter-input {
      flex: 1; min-width: 200px; max-width: 320px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); font-family: var(--font-sans); font-size: 13px;
      padding: 7px 12px; border-radius: var(--radius); outline: none;
      transition: border-color 0.15s;
    }
    .filter-input::placeholder { color: var(--text3); }
    .filter-input:focus { border-color: var(--accent); }
    .filter-select {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text2); font-family: var(--font-sans); font-size: 13px;
      padding: 7px 10px; border-radius: var(--radius); outline: none; cursor: pointer;
    }
    .filter-select:focus { border-color: var(--accent); }

    .board-columns {
      display: grid;
      grid-template-columns: repeat(5, minmax(220px, 1fr));
      gap: 16px;
      align-items: start;
      overflow-x: auto;
      padding-bottom: 20px;
    }

    .board-col {}
    .board-col-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px; padding: 0 2px;
    }
    .board-col-title {
      display: flex; align-items: center; gap: 7px;
      font-size: 12px; font-weight: 600; letter-spacing: 0.05em;
      text-transform: uppercase; color: var(--text2);
    }
    .board-col-count {
      font-size: 11px; font-weight: 600;
      background: var(--surface2); color: var(--text3);
      padding: 1px 7px; border-radius: 20px;
    }

    .initiative-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: box-shadow 0.15s, transform 0.1s, border-color 0.15s;
      position: relative;
      overflow: hidden;
    }
    .initiative-card::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    }
    .initiative-card.col-active::before    { background: var(--active-border); }
    .initiative-card.col-planning::before  { background: var(--planning-border); }
    .initiative-card.col-blocked::before   { background: var(--critical); }
    .initiative-card.col-complete::before  { background: var(--complete-border); }
    .initiative-card.col-dump::before      { background: var(--dump-border); }

    .initiative-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
      border-color: var(--accent);
    }

    .card-venture {
      font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--text3); margin-bottom: 5px;
    }
    .card-name {
      font-family: var(--font-serif); font-size: 15px; font-weight: 400;
      color: var(--text); margin-bottom: 6px; line-height: 1.35;
    }
    .card-goal {
      font-size: 12px; color: var(--text2); margin-bottom: 10px;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      gap: 6px;
    }

    /* ══════════════════════════════════════════════════════════════
       INITIATIVE DETAIL DRAWER
    ══════════════════════════════════════════════════════════════ */
    .drawer-overlay {
      position: fixed; inset: 0; background: rgba(26,25,22,0.3);
      backdrop-filter: blur(2px); z-index: 100;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .drawer-overlay.open { opacity: 1; pointer-events: all; }

    .drawer {
      position: fixed; right: 0; top: 0; bottom: 0; width: 480px;
      background: var(--surface); border-left: 1px solid var(--border);
      box-shadow: -4px 0 24px rgba(26,25,22,0.12);
      z-index: 101; overflow-y: auto;
      transform: translateX(100%); transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
    }
    .drawer.open { transform: translateX(0); }

    .drawer-header {
      padding: 24px 28px 20px;
      border-bottom: 1px solid var(--border-soft);
      position: sticky; top: 0; background: var(--surface); z-index: 1;
    }
    .drawer-header-top {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
      margin-bottom: 12px;
    }
    .drawer-title {
      font-family: var(--font-serif); font-size: 22px; font-weight: 400;
      letter-spacing: -0.02em; line-height: 1.25;
    }
    .drawer-close {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; width: 30px; height: 30px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; color: var(--text2); flex-shrink: 0;
      transition: background 0.12s;
    }
    .drawer-close:hover { background: var(--border); }

    .drawer-body { padding: 24px 28px; }

    .detail-section { margin-bottom: 28px; }
    .detail-section-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--text3);
      margin-bottom: 12px; padding-bottom: 8px;
      border-bottom: 1px solid var(--border-soft);
    }
    .detail-field { margin-bottom: 14px; }
    .detail-field label {
      display: block; font-size: 11px; font-weight: 600;
      letter-spacing: 0.07em; text-transform: uppercase;
      color: var(--text3); margin-bottom: 4px;
    }
    .detail-field p { font-size: 13.5px; color: var(--text); line-height: 1.5; }
    .detail-field-empty { font-size: 13px; color: var(--text3); font-style: italic; }

    .field-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    .quick-actions { display: flex; gap: 8px; flex-wrap: wrap; }

    /* ══════════════════════════════════════════════════════════════
       SEARCH PAGE
    ══════════════════════════════════════════════════════════════ */
    .search-hero {
      max-width: 620px; margin: 0 auto 32px;
      text-align: center; padding-top: 8px;
    }
    .search-hero h2 {
      font-family: var(--font-serif); font-size: 28px; font-weight: 400;
      letter-spacing: -0.02em; color: var(--text); margin-bottom: 6px;
    }
    .search-hero p { font-size: 13px; color: var(--text2); }

    .search-box-wrap {
      display: flex; gap: 8px; max-width: 620px; margin: 0 auto 32px;
    }
    .search-box {
      flex: 1; background: var(--surface);
      border: 1.5px solid var(--border); border-radius: var(--radius-lg);
      color: var(--text); font-family: var(--font-sans); font-size: 14px;
      padding: 12px 16px; outline: none; transition: border-color 0.15s;
      box-shadow: var(--shadow);
    }
    .search-box::placeholder { color: var(--text3); }
    .search-box:focus { border-color: var(--accent); }

    .results-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }

    .contact-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 16px 18px;
      cursor: pointer; transition: box-shadow 0.15s, transform 0.1s, border-color 0.15s;
    }
    .contact-card:hover {
      box-shadow: var(--shadow-md); transform: translateY(-2px);
      border-color: var(--accent);
    }
    .contact-name {
      font-family: var(--font-serif); font-size: 16px; font-weight: 400;
      color: var(--text); margin-bottom: 2px;
    }
    .contact-role { font-size: 12px; color: var(--text2); margin-bottom: 10px; }
    .contact-score {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; font-weight: 600; color: var(--accent);
      background: var(--accent-dim); padding: 2px 8px; border-radius: 20px;
    }
    .contact-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
    .tag {
      font-size: 11px; padding: 2px 8px;
      background: var(--surface2); color: var(--text2);
      border-radius: 20px; border: 1px solid var(--border);
    }

    /* ══════════════════════════════════════════════════════════════
       CONTACT DETAIL DRAWER (same drawer, different content)
    ══════════════════════════════════════════════════════════════ */
    .initiative-link {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 12px; border-radius: var(--radius);
      background: var(--surface2); border: 1px solid var(--border-soft);
      margin-bottom: 8px;
    }
    .initiative-link-name { font-size: 13px; font-weight: 500; color: var(--text); }
    .initiative-link-role { font-size: 11px; color: var(--text2); margin-top: 1px; }

    .match-card {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px; border-radius: var(--radius);
      background: var(--surface); border: 1px solid var(--border);
      margin-bottom: 8px; cursor: pointer;
      transition: border-color 0.12s;
    }
    .match-card:hover { border-color: var(--accent); }
    .match-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--accent-dim); color: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-serif); font-size: 15px; flex-shrink: 0;
    }
    .match-info { flex: 1; min-width: 0; }
    .match-name { font-size: 13.5px; font-weight: 500; color: var(--text); }
    .match-org  { font-size: 11px; color: var(--text2); }
    .match-score {
      font-size: 11px; font-weight: 600; color: var(--accent);
    }

    /* ══════════════════════════════════════════════════════════════
       ACTIVATION QUEUE
    ══════════════════════════════════════════════════════════════ */
    .queue-item {
      display: flex; align-items: center; gap: 14px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 14px 16px;
      margin-bottom: 10px; cursor: pointer;
      transition: box-shadow 0.15s, border-color 0.15s;
    }
    .queue-item:hover { box-shadow: var(--shadow-md); border-color: var(--accent); }
    .queue-urgency { width: 3px; border-radius: 3px; align-self: stretch; flex-shrink: 0; }
    .urgency-overdue { background: var(--critical); }
    .urgency-today   { background: var(--high); }
    .queue-info { flex: 1; min-width: 0; }
    .queue-name { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
    .queue-meta { font-size: 12px; color: var(--text2); }
    .queue-action { font-size: 12px; color: var(--accent); margin-top: 2px; }

    /* ══════════════════════════════════════════════════════════════
       MODAL (add initiative)
    ══════════════════════════════════════════════════════════════ */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(26,25,22,0.45);
      backdrop-filter: blur(3px); z-index: 200;
      display: flex; align-items: center; justify-content: center; padding: 20px;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 28px;
      width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto;
      box-shadow: var(--shadow-md);
      transform: translateY(12px); transition: transform 0.2s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal h3 {
      font-family: var(--font-serif); font-size: 22px; font-weight: 400;
      margin-bottom: 20px; letter-spacing: -0.02em;
    }
    .field-group { margin-bottom: 16px; }
    .field-group label {
      display: block; font-size: 11px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text3); margin-bottom: 5px;
    }
    .field-group input,
    .field-group select,
    .field-group textarea {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); font-family: var(--font-sans); font-size: 13px;
      padding: 8px 12px; border-radius: var(--radius); outline: none;
      transition: border-color 0.15s;
    }
    .field-group input:focus,
    .field-group select:focus,
    .field-group textarea:focus { border-color: var(--accent); }
    .field-group textarea { resize: vertical; min-height: 80px; }
    .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>

<div class="shell">
  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <h1>Super<span>Connector</span></h1>
      <p>Keyona Meeks · ReRev Labs</p>
    </div>
    <nav class="nav-section">
      <div class="nav-label">Workspace</div>
      <button class="nav-item active" onclick="showPage('board')" id="nav-board">
        <span class="icon">◈</span> Initiatives
      </button>
      <button class="nav-item" onclick="showPage('search')" id="nav-search">
        <span class="icon">⊹</span> Search Contacts
      </button>
      <button class="nav-item" onclick="showPage('queue')" id="nav-queue">
        <span class="icon">◎</span> Activation Queue
      </button>
      <button class="nav-item" onclick="showPage('angles')" id="nav-angles">
        <span class="icon">◇</span> Activation Angles
      </button>
    </nav>
    <div class="nav-section">
      <div class="nav-label">Ventures</div>
      <button class="nav-item" onclick="filterVenture('ReRev Labs')" id="nav-rerev">
        <span class="icon" style="color:#D97757">●</span> ReRev Labs
      </button>
      <button class="nav-item" onclick="filterVenture('Prismm')" id="nav-prismm">
        <span class="icon" style="color:#7B8FA1">●</span> Prismm
      </button>
      <button class="nav-item" onclick="filterVenture('Black Tech Capital')" id="nav-btc">
        <span class="icon" style="color:#5A8A5A">●</span> Black Tech Capital
      </button>
      <button class="nav-item" onclick="filterVenture('Sekhmetic')" id="nav-sekh">
        <span class="icon" style="color:#8B7355">●</span> Sekhmetic
      </button>
    </div>

<div class="toast" id="toast"></div>

<script src="config.js"></script>
<script>
// ── API ────────────────────────────────────────────────────────────────────
async function api(path, opts = {}) {
  const res = await fetch(CONFIG.API_BASE + path, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      'X-API-Key': CONFIG.API_KEY,
      ...(opts.headers || {}),
    },
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.detail || `HTTP ${res.status}`);
  }
  return res.json();
}

// ── STATE ──────────────────────────────────────────────────────────────────
let allInitiatives = [];
let activeVentureFilter = '';
let currentPage = 'board';

// ── NAV ────────────────────────────────────────────────────────────────────
function showPage(page) {
  ['board','search','queue','angles'].forEach(p => {
    document.getElementById('page-' + p).style.display = p === page ? '' : 'none';
    document.getElementById('nav-' + p)?.classList.toggle('active', p === page);
  });
  const titles = { board:'Initiatives Board', search:'Search Contacts', queue:'Activation Queue', angles:'Activation Angles' };
  document.getElementById('page-title').textContent = titles[page] || '';
  document.getElementById('topbar-add-btn').style.display = page === 'board' ? '' : 'none';
  currentPage = page;

  if (page === 'queue')  loadQueue();
  if (page === 'angles') loadAngles();
}

function filterVenture(v) {
  activeVentureFilter = v;
  showPage('board');
  ['rerev','prismm','btc','sekh'].forEach(id => {
    document.getElementById('nav-' + id)?.classList.remove('active');
  });
  const map = { 'ReRev Labs':'rerev', 'Prismm':'prismm', 'Black Tech Capital':'btc', 'Sekhmetic':'sekh' };
  if (map[v]) document.getElementById('nav-' + map[v])?.classList.add('active');
  renderBoard();
}

// ── INITIATIVES BOARD ──────────────────────────────────────────────────────
async function loadBoard() {
  try {
    const res = await api('/initiatives');
    allInitiatives = res.data || [];
    renderBoard();
    document.getElementById('topbar-meta').textContent = `${allInitiatives.length} initiatives`;
  } catch (e) {
    document.getElementById('board-columns').innerHTML =
      `<div class="empty-state" style="grid-column:1/-1"><h3>Could not load initiatives</h3><p>${e.message}</p></div>`;
  }
}

const COLUMNS = [
  { key: 'Active',      label: 'Active',      cls: 'col-active'   },
  { key: 'Planning',    label: 'Planning',    cls: 'col-planning' },
  { key: 'Brain Dump',  label: 'Brain Dump',  cls: 'col-dump'     },
  { key: 'Blocked',     label: 'Blocked',     cls: 'col-blocked'  },
  { key: 'Complete',    label: 'Complete',    cls: 'col-complete' },
];
const DOT_CLASS = {
  'Active':'dot-active','Planning':'dot-planning','Brain Dump':'dot-dump',
  'Blocked':'dot-blocked','Complete':'dot-complete',
};

function renderBoard() {
  const q       = (document.getElementById('board-search')?.value || '').toLowerCase();
  const priFilter = document.getElementById('board-priority')?.value || '';

  let items = allInitiatives.filter(i => {
    if (activeVentureFilter && i.venture !== activeVentureFilter) return false;
    if (priFilter && i.priority !== priFilter) return false;
    if (q) {
      const hay = [i.initiative_name, i.goal, i.venture, i.notes, i.brain_dump].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  const grid = document.getElementById('board-columns');
  grid.innerHTML = COLUMNS.map(col => {
    const cards = items.filter(i => (i.status || 'Brain Dump') === col.key);
    return `
      <div class="board-col">
        <div class="board-col-header">
          <div class="board-col-title">
            <span class="status-dot ${DOT_CLASS[col.key]}"></span>${col.label}
          </div>
          <span class="board-col-count">${cards.length}</span>
        </div>
        ${cards.length === 0
          ? `<div style="padding:20px 0;text-align:center;color:var(--text3);font-size:12px">No initiatives</div>`
          : cards.map(c => initiativeCard(c, col.cls)).join('')
        }
      </div>`;
  }).join('');
}

function initiativeCard(i, cls) {
  const priClass = { Critical:'badge-critical', High:'badge-high', Medium:'badge-medium', Low:'badge-low', Parked:'badge-low' };
  return `
    <div class="initiative-card ${cls}" onclick="openInitiative('${i.initiative_id}')">
      <div class="card-venture">${esc(i.venture || '—')}</div>
      <div class="card-name">${esc(i.initiative_name || 'Untitled')}</div>
      ${i.goal ? `<div class="card-goal">${esc(i.goal)}</div>` : ''}
      <div class="card-footer">
        <span class="badge ${priClass[i.priority] || 'badge-low'}">${i.priority || 'No priority'}</span>
        ${i.phoebe_cadence && i.phoebe_cadence !== 'None'
          ? `<span style="font-size:11px;color:var(--text3)">⊛ ${i.phoebe_cadence}</span>` : ''}
      </div>
    </div>`;
}

// ── INITIATIVE DRAWER ──────────────────────────────────────────────────────
async function openInitiative(id) {
  const overlay = document.getElementById('drawer-overlay');
  const drawer  = document.getElementById('initiative-drawer');
  overlay.classList.add('open');
  drawer.classList.add('open');

  document.getElementById('drawer-title').textContent = 'Loading…';
  document.getElementById('drawer-badges').innerHTML = '';
  document.getElementById('drawer-body').innerHTML = '<div class="loading-state"><div class="spinner"></div></div>';

  try {
    const res = await api(`/initiative/${id}`);
    const d   = res.data;
    const subs = res.sub_projects || [];
    const stks = res.stakeholders  || [];
    const acts = res.action_items  || [];

    document.getElementById('drawer-title').textContent = d.initiative_name || 'Initiative';
    document.getElementById('drawer-badges').innerHTML = [
      d.status   ? `<span class="badge badge-${(d.priority||'').toLowerCase()}">${d.status}</span>` : '',
      d.priority ? `<span class="badge badge-${(d.priority||'').toLowerCase()}">${d.priority}</span>` : '',
      d.venture  ? `<span style="font-size:11px;color:var(--text2)">${esc(d.venture)}</span>` : '',
    ].join('');

    document.getElementById('drawer-body').innerHTML = `
      ${d.goal ? `
        <div class="detail-section">
          <div class="detail-section-label">Goal</div>
          <p style="font-family:var(--font-serif);font-size:16px;font-weight:400;line-height:1.5;color:var(--text)">${esc(d.goal)}</p>
        </div>` : ''}

      <div class="detail-section">
        <div class="detail-section-label">Details</div>
        <div class="field-grid-2">
          ${detailField('Phoebe Cadence', d.phoebe_cadence)}
          ${detailField('Timeline', d.timeline)}
          ${detailField('Brand', d.brand)}
          ${detailField('Distribution', d.distribution)}
          ${detailField('Format', d.format)}
          ${detailField('Budget', d.budget)}
        </div>
      </div>

      ${d.brain_dump ? `
        <div class="detail-section">
          <div class="detail-section-label">Brain Dump</div>
          <p style="font-size:13px;color:var(--text2);line-height:1.6;white-space:pre-wrap">${esc(d.brain_dump)}</p>
        </div>` : ''}

      ${stks.length ? `
        <div class="detail-section">
          <div class="detail-section-label">Stakeholders (${stks.length})</div>
          ${stks.map(s => `
            <div class="initiative-link">
              <div>
                <div class="initiative-link-name">${esc(s.full_name || '—')}</div>
                <div class="initiative-link-role">${esc(s.role || '')} · ${esc(s.engagement_status || '')}</div>
              </div>
            </div>`).join('')}
        </div>` : ''}

      ${subs.length ? `
        <div class="detail-section">
          <div class="detail-section-label">Sub-Projects (${subs.length})</div>
          ${subs.map(s => `
            <div class="initiative-link">
              <div>
                <div class="initiative-link-name">${esc(s.sub_project_name || '—')}</div>
                <div class="initiative-link-role">${esc(s.status || '')} · ${esc(s.owner || '')}</div>
              </div>
            </div>`).join('')}
        </div>` : ''}

      ${acts.length ? `
        <div class="detail-section">
          <div class="detail-section-label">Action Items (${acts.length})</div>
          ${acts.map(a => `
            <div class="initiative-link">
              <div>
                <div class="initiative-link-name">${esc(a.description || '—')}</div>
                <div class="initiative-link-role">${esc(a.status || '')}${a.due_date ? ' · Due ' + a.due_date.substring(0,10) : ''}</div>
              </div>
            </div>`).join('')}
        </div>` : ''}

      <div class="detail-section">
        <div class="detail-section-label">Quick Actions</div>
        <div class="quick-actions">
          ${d.status !== 'Active'    ? `<button class="btn btn-primary btn-sm" onclick="patchStatus('${id}','Active')">▶ Set Active</button>` : ''}
          ${d.status !== 'Blocked'   ? `<button class="btn btn-ghost  btn-sm" onclick="patchStatus('${id}','Blocked')">⊘ Mark Blocked</button>` : ''}
          ${d.status !== 'Complete'  ? `<button class="btn btn-ghost  btn-sm" onclick="patchStatus('${id}','Complete')">✓ Mark Complete</button>` : ''}
          ${d.status === 'Complete'  ? `<button class="btn btn-ghost  btn-sm" onclick="patchStatus('${id}','Active')">↺ Reopen</button>` : ''}
        </div>
      </div>
    `;
  } catch (e) {
    document.getElementById('drawer-body').innerHTML =
      `<p style="color:var(--critical);padding:16px">${e.message}</p>`;
  }
}

async function patchStatus(id, status) {
  try {
    await api(`/initiative/${id}/status`, {
      method: 'PATCH',
      body: JSON.stringify({ status }),
    });
    toast(`Moved to ${status}`);
    allInitiatives = allInitiatives.map(i =>
      i.initiative_id === id ? { ...i, status } : i
    );
    renderBoard();
    openInitiative(id);
  } catch (e) { toast('Error: ' + e.message); }
}

function closeDrawer() {
  document.getElementById('drawer-overlay').classList.remove('open');
  document.getElementById('initiative-drawer').classList.remove('open');
  document.getElementById('contact-drawer').classList.remove('open');
}

function detailField(label, val) {
  if (!val) return '';
  return `
    <div class="detail-field">
      <label>${label}</label>
      <p>${esc(val)}</p>
    </div>`;
}

// ── SEARCH ─────────────────────────────────────────────────────────────────
async function runSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  const el = document.getElementById('search-results');
  el.innerHTML = '<div class="loading-state"><div class="spinner"></div>Searching…</div>';
  try {
    const res = await api('/search', {
      method: 'POST',
      body: JSON.stringify({ query: q, top_k: 12 }),
    });
    const results = res.results || [];
    if (!results.length) {
      el.innerHTML = '<div class="empty-state"><h3>No matches</h3><p>Try a different description.</p></div>';
      return;
    }
    el.innerHTML = `<div class="results-grid">${results.map(contactCard).join('')}</div>`;
  } catch (e) {
    el.innerHTML = `<div class="empty-state"><h3>Search failed</h3><p>${e.message}</p></div>`;
  }
}

function contactCard(c) {
  const score = c.similarity ? Math.round(c.similarity * 100) : null;
  const roleOrg = [c.title_role, c.organization].filter(Boolean).join(' · ');
  return `
    <div class="contact-card" onclick="openContact('${c.contact_id}')">
      <div class="contact-name">${esc(c.full_name || 'Unknown')}</div>
      <div class="contact-role">${esc(roleOrg || '—')}</div>
      ${score !== null ? `<span class="contact-score">⊹ ${score}% match</span>` : ''}
      <div class="contact-tags">
        ${c.venture    ? `<span class="tag">${esc(c.venture)}</span>` : ''}
        ${c.relationship_health  ? `<span class="tag">${esc(c.relationship_health)}</span>` : ''}
        ${c.activation_potential ? `<span class="tag">${esc(c.activation_potential)}</span>` : ''}
      </div>
    </div>`;
}

// ── CONTACT DRAWER ────────────────────────────────────────────────────────
async function openContact(id) {
  const drawer = document.getElementById('contact-drawer');
  document.getElementById('drawer-overlay').classList.add('open');
  drawer.classList.add('open');
  document.getElementById('contact-drawer-title').textContent = 'Loading…';
  document.getElementById('contact-drawer-sub').textContent = '';
  document.getElementById('contact-drawer-body').innerHTML =
    '<div class="loading-state"><div class="spinner"></div></div>';

  try {
    const res = await api(`/contact/${id}`);
    const c   = res.data;
    const links = res.initiative_links || [];

    document.getElementById('contact-drawer-title').textContent = c.full_name || 'Contact';
    document.getElementById('contact-drawer-sub').textContent =
      [c.title_role, c.organization].filter(Boolean).join(' · ');

    // Similar matches
    let matchesHtml = '';
    try {
      const mRes = await api(`/match/${id}?limit=4`);
      const matches = mRes.matches || [];
      if (matches.length) {
        matchesHtml = `
          <div class="detail-section">
            <div class="detail-section-label">Similar Contacts</div>
            ${matches.map(m => `
              <div class="match-card" onclick="openContact('${m.contact_id}')">
                <div class="match-avatar">${(m.full_name||'?')[0]}</div>
                <div class="match-info">
                  <div class="match-name">${esc(m.full_name||'—')}</div>
                  <div class="match-org">${esc([m.title_role,m.organization].filter(Boolean).join(' · ') || '—')}</div>
                </div>
                <span class="match-score">${Math.round((m.similarity||0)*100)}%</span>
              </div>`).join('')}
          </div>`;
      }
    } catch (_) {}

    document.getElementById('contact-drawer-body').innerHTML = `
      <div class="detail-section">
        <div class="detail-section-label">Profile</div>
        <div class="field-grid-2">
          ${detailField('Email', c.email)}
          ${detailField('How We Met', c.how_we_met)}
          ${detailField('Relationship Health', c.relationship_health)}
          ${detailField('Activation Potential', c.activation_potential)}
          ${detailField('Venture', c.venture)}
        </div>
      </div>
      ${c.what_building || c.what_need || c.what_offer ? `
        <div class="detail-section">
          <div class="detail-section-label">Context</div>
          ${detailField("What They're Building", c.what_building)}
          ${detailField("What They Need", c.what_need)}
          ${detailField("What They Offer", c.what_offer)}
        </div>` : ''}
      ${c.notes ? `
        <div class="detail-section">
          <div class="detail-section-label">Notes</div>
          <p style="font-size:13px;color:var(--text2);line-height:1.6;white-space:pre-wrap">${esc(c.notes)}</p>
        </div>` : ''}
      ${links.length ? `
        <div class="detail-section">
          <div class="detail-section-label">In ${links.length} Initiative${links.length>1?'s':''}</div>
          ${links.map(l => `
            <div class="initiative-link" style="cursor:pointer" onclick="closeContactDrawer();openInitiative('${l.initiative_id}')">
              <div>
                <div class="initiative-link-name">${esc(l.initiative_id)}</div>
                <div class="initiative-link-role">${esc(l.role||'')} · ${esc(l.engagement_status||'')}</div>
              </div>
            </div>`).join('')}
        </div>` : ''}
      ${matchesHtml}
      <div class="detail-section">
        <div class="detail-section-label">Actions</div>
        <div class="quick-actions">
          <button class="btn btn-primary btn-sm" onclick="draftIntroPrompt('${id}')">✉ Draft Intro</button>
        </div>
      </div>
    `;
  } catch (e) {
    document.getElementById('contact-drawer-body').innerHTML =
      `<p style="color:var(--critical);padding:16px">${e.message}</p>`;
  }
}

function closeContactDrawer() {
  document.getElementById('contact-drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
}

function draftIntroPrompt(idA) {
  const idB = prompt('Enter the Contact ID of the second person for the intro:');
  if (!idB) return;
  draftIntro(idA, idB.trim());
}

async function draftIntro(idA, idB) {
  toast('Drafting intro email…');
  try {
    const res = await api('/draft', {
      method: 'POST',
      body: JSON.stringify({ contact_a_id: idA, contact_b_id: idB }),
    });
    alert(res.draft || 'Draft generated.');
  } catch (e) { toast('Error: ' + e.message); }
}

// ── ACTIVATION QUEUE ──────────────────────────────────────────────────────
async function loadQueue() {
  const el = document.getElementById('queue-list');
  try {
    const today = new Date().toISOString().substring(0,10);
    const res = await api(`/action-items?due_before=${today}`);
    const items = res.data || [];
    if (!items.length) {
      el.innerHTML = '<div class="empty-state"><h3>Queue is clear ✓</h3><p>No overdue or due-today action items.</p></div>';
      return;
    }
    const now = new Date(); now.setHours(0,0,0,0);
    el.innerHTML = items.map(a => {
      const d = a.due_date ? new Date(a.due_date) : null;
      const overdue = d && d < now;
      return `
        <div class="queue-item">
          <div class="queue-urgency ${overdue ? 'urgency-overdue' : 'urgency-today'}"></div>
          <div class="queue-info">
            <div class="queue-name">${esc(a.description || '—')}</div>
            <div class="queue-meta">${esc(a.initiative_id || '')}${a.action_type ? ' · ' + a.action_type : ''}</div>
            ${a.due_date ? `<div class="queue-action">Due ${a.due_date.substring(0,10)}</div>` : ''}
          </div>
          <span class="badge badge-${(a.priority||'medium').toLowerCase()}">${a.priority||'Medium'}</span>
        </div>`;
    }).join('');
  } catch (e) {
    el.innerHTML = `<div class="empty-state"><h3>Could not load</h3><p>${e.message}</p></div>`;
  }
}

// ── ACTIVATION ANGLES ──────────────────────────────────────────────────────
async function loadAngles() {
  const el = document.getElementById('angles-list');
  try {
    const res = await api('/activation-angles');
    const angles = res.data || [];
    if (!angles.length) {
      el.innerHTML = '<div class="empty-state"><h3>No activation angles yet</h3><p>Add reusable outreach templates and strategies.</p></div>';
      return;
    }
    el.innerHTML = angles.map(a => `
      <div class="card" style="padding:20px 24px;margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:8px">
          <div style="font-family:var(--font-serif);font-size:17px;font-weight:400">${esc(a.angle_name||'—')}</div>
          <span style="font-size:11px;color:var(--text3);flex-shrink:0">${esc(a.best_for||'')}</span>
        </div>
        <p style="font-size:13px;color:var(--text2);margin-bottom:${a.template?'12px':'0'}">${esc(a.description||'')}</p>
        ${a.template ? `
          <div style="background:var(--surface2);border:1px solid var(--border-soft);border-radius:8px;padding:12px 14px">
            <div style="font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:6px">Template</div>
            <p style="font-size:12.5px;color:var(--text);line-height:1.6;white-space:pre-wrap">${esc(a.template)}</p>
          </div>` : ''}
        ${a.effectiveness_notes ? `<p style="font-size:12px;color:var(--accent);margin-top:10px">⊹ ${esc(a.effectiveness_notes)}</p>` : ''}
      </div>`).join('');
  } catch (e) {
    el.innerHTML = `<div class="empty-state"><h3>Could not load</h3><p>${e.message}</p></div>`;
  }
}

// ── ADD INITIATIVE ────────────────────────────────────────────────────────
function openAddModal()  { document.getElementById('add-modal').classList.add('open'); }
function closeAddModal() { document.getElementById('add-modal').classList.remove('open'); }

async function saveInitiative() {
  const name = document.getElementById('new-name').value.trim();
  if (!name) { toast('Name is required'); return; }
  const payload = {
    initiative_name: name,
    venture:         document.getElementById('new-venture').value,
    priority:        document.getElementById('new-priority').value,
    status:          document.getElementById('new-status').value,
    phoebe_cadence:  document.getElementById('new-cadence').value,
    goal:            document.getElementById('new-goal').value,
    brain_dump:      document.getElementById('new-braindump').value,
  };
  try {
    const res = await api('/initiative', { method:'POST', body: JSON.stringify(payload) });
    toast('Initiative created ✓');
    closeAddModal();
    ['new-name','new-goal','new-braindump'].forEach(id => document.getElementById(id).value = '');
    await loadBoard();
  } catch (e) { toast('Error: ' + e.message); }
}

// ── ADD ANGLE ─────────────────────────────────────────────────────────────
function openAngleModal()  { document.getElementById('angle-modal').classList.add('open'); }
function closeAngleModal() { document.getElementById('angle-modal').classList.remove('open'); }

async function saveAngle() {
  const name = document.getElementById('ang-name').value.trim();
  if (!name) { toast('Name is required'); return; }
  const payload = {
    angle_name:   name,
    description:  document.getElementById('ang-desc').value,
    template:     document.getElementById('ang-template').value,
    best_for:     document.getElementById('ang-best').value,
  };
  try {
    await api('/activation-angle', { method:'POST', body: JSON.stringify(payload) });
    toast('Angle saved ✓');
    closeAngleModal();
    ['ang-name','ang-desc','ang-template','ang-best'].forEach(id => document.getElementById(id).value='');
    if (currentPage === 'angles') loadAngles();
  } catch (e) { toast('Error: ' + e.message); }
}

// ── UTILS ─────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── INIT ──────────────────────────────────────────────────────────────────
loadBoard();
</script>
